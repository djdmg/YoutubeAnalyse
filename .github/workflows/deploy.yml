name: Deploy to NAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Synology NAS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port:     ${{ secrets.SSH_PORT }}
          envs:     GH_TOKEN
          script: |
            set -e

            export PATH="/sbin:/bin:/usr/sbin:/usr/bin:/usr/syno/sbin:/usr/syno/bin:/usr/local/sbin:/usr/local/bin"

            echo "→ Versions détectées :"
            git --version
            php84 --version | head -1
            php84 /usr/local/bin/composer --version

            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            REPO="https://x-access-token:${GH_TOKEN}@github.com/djdmg/YoutubeAnalyse.git"
            ENV_BACKUP="/volume4/web/.env.YoutubeAnalyse.bak"

            git config --global --add safe.directory "$DEPLOY_DIR"

            # Backup persistant du .env.local — hors du repo git, survit à tous les déploiements

            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "→ Mise à jour du dépôt..."
              cd "$DEPLOY_DIR"
              git remote set-url origin "$REPO"
              [ -f .env.local ] && cp .env.local "$ENV_BACKUP"
              git fetch origin main
              git reset --hard origin/main
              git remote set-url origin "https://github.com/djdmg/YoutubeAnalyse.git"
              if [ -f "$ENV_BACKUP" ]; then
                cp "$ENV_BACKUP" .env.local
                echo "→ .env.local restauré depuis le backup persistant"
              fi
            else
              echo "→ Premier déploiement — initialisation dans le dossier existant..."
              mkdir -p "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
              git init
              git remote add origin "$REPO"
              git fetch origin main
              git reset --hard origin/main
              git remote set-url origin "https://github.com/djdmg/YoutubeAnalyse.git"
            fi

            export APP_ENV=prod
            export APP_DEBUG=0

            echo "→ Installation des dépendances PHP..."
            php84 /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

            echo "→ Migrations base de données..."
            php84 bin/console doctrine:migrations:migrate --no-interaction --env=prod

            echo "→ Cache..."
            php84 bin/console cache:clear --env=prod
            php84 bin/console cache:warmup --env=prod

            echo "→ Build des assets Webpack (npm)..."
            # Détection de node — Synology peut l'avoir dans /usr/local/bin ou via nvm
            NODE_BIN=""
            for candidate in node /usr/local/bin/node /usr/bin/node "$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node 2>/dev/null | sort -V | tail -1)/bin/node"; do
              if [ -x "$candidate" ] || command -v "$candidate" >/dev/null 2>&1; then
                NODE_BIN="$(command -v $candidate 2>/dev/null || echo $candidate)"
                break
              fi
            done

            if [ -n "$NODE_BIN" ]; then
              NPM_BIN="$(dirname $NODE_BIN)/npm"
              echo "  Node: $($NODE_BIN --version)  NPM: $($NPM_BIN --version)"
              $NPM_BIN ci --no-audit --prefer-offline 2>/dev/null || $NPM_BIN install --no-audit
              $NPM_BIN run build
            else
              echo "⚠ Node.js introuvable — assets Webpack non recompilés (installe Node via le Centre de paquets Synology)"
            fi

            echo "→ Assets Symfony..."
            php84 bin/console assets:install --env=prod

            echo "✓ Déploiement YoutubeAnalyse terminé."
